serenity {
    project.name = "NBMS Serenity BDD with Cucumber"
    report.encoding = "UTF-8"
    outputDirectory = "target/site/serenity"
    take.screenshots = FOR_EACH_ACTION
    verbose.steps = true
    restart.browser.for.each = feature
}
# ====================== 默认配置 ======================
webdriver {
  driver = chrome                     # 切换为本地模式
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true

    "goog:chromeOptions" {
      args = [
        "--window-size=1920,1080",   # 不加 headless，保留界面
        "--start-maximized",         # 启动时最大化（可选）
        "--remote-allow-origins=*"
      ]
    }
  }
}
# ====================== 不同环境覆盖配置 ======================
environments {
  # 本地开发环境（dev）—— 使用本地 Chrome（带界面，方便调试）
  dev {
    webdriver {
      driver = chrome                     # 切换为本地模式
      capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true

        "goog:chromeOptions" {
          args = [
            "--window-size=1920,1080",   # 不加 headless，保留界面
            "--start-maximized",         # 启动时最大化（可选）
            "--remote-allow-origins=*"
          ]
        }
      }
    }
  }

  # CI/Docker 环境（可命名为 ci、docker、jenkins 等）
  ci {
    webdriver {
      driver = remote
      remote {
        url = "http://chrome:4444/wd/hub"
        driver = chrome
      }
      capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true
        "goog:chromeOptions" {
          args = [
            "--headless=new",          # 在 ci 环境下强制无头
            "--no-sandbox",
            "--disable-setuid-sandbox",
            "--disable-dev-shm-usage",
            "--disable-gpu",
            "--window-size=1920,1080",
            "--remote-allow-origins=*"
          ]
        }
      }
    }
  }
}