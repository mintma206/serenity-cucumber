serenity {
  project.name = "NBMS Serenity BDD with Cucumber"
  report.encoding = "UTF-8"
  outputDirectory = "target/site/serenity"
  take.screenshots = FOR_EACH_ACTION         // 每一步都截图，便于排查
  verbose.steps = true                       // 控制台详细日志
  compress.filenames = false                 // 文件名可读性优先
  restart.browser.for.each = feature         //保持 feature 级别重启，避免状态污染
}
// 本地调试友好配置
headless.mode = false                        // 浏览器可见
