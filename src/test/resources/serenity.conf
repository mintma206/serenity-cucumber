serenity {
    project.name = "NBMS Serenity BDD with Cucumber"
    report.encoding = "UTF-8"
    outputDirectory = "target/site/serenity"
    take.screenshots = FOR_EACH_ACTION
    verbose.steps = true
    restart.browser.for.each = feature
}

webdriver {
    driver = remote

    # 关键配置：连接 Docker 中的 selenium/standalone-chrome 服务
    # 如果你的 docker-compose 服务名不是 "chrome"，请改成对应的名称（如 selenium、chrome-node 等）
    remote {
        url = "http://chrome:4444/wd/hub"
        driver = chrome
    }

    # 推荐的 Chrome 能力配置（W3C 标准格式）
    capabilities {
        browserName = "chrome"
        acceptInsecureCerts = true

        "goog:chromeOptions" {
            args = [
                "--headless=new",           # 新版 headless 模式（Chrome 109+ 推荐）
                "--no-sandbox",
                "--disable-setuid-sandbox",
                "--disable-dev-shm-usage",
                "--disable-gpu",
                "--window-size=1920,1080",
                "--disable-extensions",
                "--remote-allow-origins=*"
            ]
        }
    }
}
