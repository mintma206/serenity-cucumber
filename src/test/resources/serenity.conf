serenity {
    project.name = "NBMS Serenity BDD with Cucumber"
    report.encoding = "UTF-8"
    outputDirectory = "target/site/serenity"

    # ==================== 关键优化 ====================
    #take.screenshots = FOR_FAILURES          # 强烈建议：只在失败时截图（报告体积大幅减小）
    take.screenshots = FOR_EACH_ACTION     # 如果你想每步都截图，再改回这个

    verbose.steps = true
    compress.filenames = false
    restart.browser.for.each = feature        # feature级别重启浏览器，比较稳妥

    # WebDriver 配置
    webdriver {
        driver = chrome
        wait.for.timeout = 10                 # 显式等待超时时间（秒）
        implicit.timeout = 5
    }
}

# Chrome 在 Docker 中的优化配置
chrome {
    arguments = [
        "--headless=new",                     # 使用新版 headless（更稳定）
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-gpu",
        "--disable-setuid-sandbox",
        "--remote-debugging-port=9222",
        "--window-size=1920,1080",
        "--disable-extensions",
        "--disable-infobars"
    ]
    
    # 可选：指定 ChromeDriver 版本（如果自动下载有问题）
    # driver.version = "latest"
}
