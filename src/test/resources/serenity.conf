serenity {
    project.name = "NBMS Serenity BDD with Cucumber"
    report.encoding = "UTF-8"
    outputDirectory = "target/site/serenity"

    # 推荐：只在失败时截图，报告体积小很多
    take.screenshots = FOR_EACH_ACTION
    verbose.steps = true
    restart.browser.for.each = feature

    webdriver {
        driver = chrome
        wait.for.timeout = 10
        implicit.timeout = 5
    }
}

# Docker 环境中 Chrome Headless 关键配置
chrome {
    arguments = [
        "--headless=new",                    # 新版 headless，更稳定
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-gpu",
        "--disable-setuid-sandbox",
        "--remote-debugging-port=9222",
        "--window-size=1920,1080",
        "--disable-extensions",
        "--disable-infobars",
        "--disable-popup-blocking"
    ]
}
